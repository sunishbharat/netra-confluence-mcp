services:
  netra-confluence-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ghcr.io/sunishbharat/netra-confluence-mcp:local
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      - SERVER_TRANSPORT=streamable-http
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8765
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
